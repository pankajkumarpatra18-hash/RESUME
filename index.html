<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pankaj Kumar Patra — Resume</title>
  <link 
  ref="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy:    #07090F;
      --card:    #101422;
      --card2:   #141929;
      --border:  #1E2438;
      --border2: #2A3350;
      --gold:    #C9A84C;
      --gold-lt: #E8D48E;
      --gold-dk: #7A5A1E;
      --silver:  #8090AA;
      --white:   #ECF0F8;
      --cream:   #CEC09A;
      --r:       6px;
    }
    html { scroll-behavior: smooth; }
    body {
      background: var(--navy);
      color: var(--white);
      font-family: 'EB Garamond', Georgia, serif;
      font-size: 17px; line-height: 1.75;
      min-height: 100vh; overflow-x: hidden;
    }
    body::after {
      content: ''; position: fixed; inset: 0;
      background-image:
        repeating-linear-gradient(90deg, rgba(201,168,76,.022) 0, rgba(201,168,76,.022) 1px, transparent 1px, transparent 80px),
        repeating-linear-gradient(0deg,  rgba(201,168,76,.014) 0, rgba(201,168,76,.014) 1px, transparent 1px, transparent 80px);
      pointer-events: none; z-index: 0;
    }
    .top-bar {
      position: relative; z-index: 100; height: 3px;
      background: linear-gradient(90deg, transparent, var(--gold-dk) 15%, var(--gold) 40%, var(--gold-lt) 55%, var(--gold) 75%, var(--gold-dk) 90%, transparent);
    }
    nav {
      position: sticky; top: 0; z-index: 99;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 6vw; height: 54px;
      background: rgba(7,9,15,.94);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
    }
    .nav-brand {
      font-family: 'Rajdhani', sans-serif;
      font-size: 11px; font-weight: 700; letter-spacing: .26em; text-transform: uppercase;
      color: var(--gold);
    }
    .nav-links { display: flex; gap: 28px; list-style: none; }
    .nav-links a {
      font-family: 'Rajdhani', sans-serif;
      font-size: 10.5px; font-weight: 600; letter-spacing: .2em; text-transform: uppercase;
      color: var(--silver); text-decoration: none; transition: color .2s;
    }
    .nav-links a:hover { color: var(--gold-lt); }

    /* HERO */
    .hero {
      position: relative; z-index: 1;
      padding: 80px 6vw 72px;
      border-bottom: 1px solid var(--border);
      background: radial-gradient(ellipse 75% 55% at 65% 50%, rgba(201,168,76,.055) 0%, transparent 70%);
    }
    .hero-inner {
      max-width: 960px; margin: 0 auto;
      display: flex; align-items: center; gap: 64px;
    }

    /* PHOTO */
    .photo-frame {
      position: relative; flex-shrink: 0; width: 210px;
    }
    .photo-frame::before {
      content: ''; position: absolute; inset: -7px;
      border-radius: var(--r);
      background: linear-gradient(145deg, var(--gold) 0%, var(--gold-dk) 50%, transparent 75%);
      z-index: 0;
    }
    .photo-frame img {
      position: relative; z-index: 2;
      width: 210px; height: 252px;
      object-fit: cover; object-position: center top;
      display: block; border-radius: var(--r);
      filter: contrast(1.06) saturate(0.9);
      box-shadow: 0 24px 64px rgba(0,0,0,.7), 0 0 0 1px rgba(201,168,76,.25);
    }
    .corner { position: absolute; width: 20px; height: 20px; z-index: 4; }
    .c-tl { top:-10px; left:-10px; border-top:2px solid var(--gold); border-left:2px solid var(--gold); border-radius:2px 0 0 0; }
    .c-tr { top:-10px; right:-10px; border-top:2px solid var(--gold); border-right:2px solid var(--gold); border-radius:0 2px 0 0; }
    .c-bl { bottom:-10px; left:-10px; border-bottom:2px solid var(--gold); border-left:2px solid var(--gold); border-radius:0 0 0 2px; }
    .c-br { bottom:-10px; right:-10px; border-bottom:2px solid var(--gold); border-right:2px solid var(--gold); border-radius:0 0 2px 0; }

    /* HERO TEXT */
    .cv-badge {
      display: inline-flex; align-items: center; gap: 12px;
      font-family: 'Rajdhani', sans-serif;
      font-size: 10px; font-weight: 700; letter-spacing: .32em; text-transform: uppercase;
      color: var(--gold); margin-bottom: 22px;
    }
    .cv-badge::before, .cv-badge::after {
      content: ''; height: 1px; width: 28px; background: var(--gold-dk);
    }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(42px, 5.5vw, 68px);
      font-weight: 900; line-height: 1.0; letter-spacing: -.02em; color: var(--white);
    }
    h1 span {
      display: block; font-style: italic; font-weight: 400;
      color: var(--gold); font-size: .75em; letter-spacing: .05em;
    }
    .tagline {
      margin: 16px 0 36px;
      font-family: 'EB Garamond', serif; font-style: italic;
      font-size: 1.1rem; color: var(--silver); letter-spacing: .03em;
    }
    .contacts { display: flex; flex-wrap: wrap; gap: 12px 28px; }
    .c-item {
      display: flex; align-items: center; gap: 10px;
      font-family: 'Rajdhani', sans-serif;
      font-size: 12.5px; font-weight: 500; letter-spacing: .07em; color: var(--cream);
    }
    .c-icon {
      width: 28px; height: 28px; border: 1px solid var(--border2);
      background: var(--card); display: flex; align-items: center;
      justify-content: center; font-size: 13px; flex-shrink: 0; border-radius: 3px;
    }
    .contacts a { color: var(--gold); text-decoration: none; transition: color .2s; }
    .contacts a:hover { color: var(--gold-lt); }

    /* PAGE */
    .page { max-width: 960px; margin: 0 auto; padding: 0 6vw 100px; position: relative; z-index: 1; }

    /* SECTIONS */
    .section {
      padding-top: 60px;
      opacity: 0; transform: translateY(20px);
      transition: opacity .55s ease, transform .55s ease;
    }
    .section.visible { opacity: 1; transform: none; }
    .sec-label {
      font-family: 'Rajdhani', sans-serif;
      font-size: 10px; font-weight: 700; letter-spacing: .34em; text-transform: uppercase;
      color: var(--gold-dk); margin-bottom: 5px;
    }
    .sec-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem; font-weight: 700; color: var(--white);
      padding-bottom: 14px; margin-bottom: 28px;
      border-bottom: 1px solid var(--border); position: relative;
    }
    .sec-title::after {
      content: ''; position: absolute; left: 0; bottom: -1px;
      width: 50px; height: 2px;
      background: linear-gradient(90deg, var(--gold), transparent);
    }

    /* SUMMARY */
    .summary-card {
      position: relative; overflow: hidden;
      background: linear-gradient(135deg, var(--card), var(--card2));
      border: 1px solid var(--border); border-left: 3px solid var(--gold);
      padding: 30px 36px;
      font-size: 1.05rem; color: var(--cream); line-height: 1.88;
      border-radius: 0 var(--r) var(--r) 0;
    }
    .summary-card::before {
      content: '\201C'; position: absolute; top: -20px; right: 18px;
      font-family: 'Playfair Display', serif; font-size: 140px; line-height: 1;
      color: rgba(201,168,76,.055); pointer-events: none;
    }
    .summary-card strong { color: var(--gold-lt); font-weight: 500; }

    /* ENTRIES */
    .entry {
      position: relative; overflow: hidden;
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--r); padding: 26px 30px; margin-bottom: 14px;
      transition: transform .22s ease, box-shadow .22s ease, border-color .22s ease;
    }
    .entry::before {
      content: ''; position: absolute; top: 0; left: 0; bottom: 0; width: 3px;
      background: linear-gradient(180deg, var(--gold), var(--gold-dk));
      transform: scaleY(0); transform-origin: top; transition: transform .3s ease;
    }
    .entry:hover { transform: translateY(-2px); border-color: var(--border2); box-shadow: 0 8px 40px rgba(0,0,0,.45), 0 0 20px rgba(201,168,76,.06); }
    .entry:hover::before { transform: scaleY(1); }
    .entry-head {
      display: flex; justify-content: space-between; align-items: flex-start;
      flex-wrap: wrap; gap: 8px; margin-bottom: 3px;
    }
    .entry-org { font-family: 'Playfair Display', serif; font-size: 1.18rem; font-weight: 700; color: var(--white); }
    .entry-date {
      font-family: 'Rajdhani', sans-serif;
      font-size: 11px; font-weight: 700; letter-spacing: .14em;
      color: var(--gold); background: rgba(201,168,76,.09);
      border: 1px solid rgba(201,168,76,.2);
      padding: 3px 11px; border-radius: 2px; white-space: nowrap;
    }
    .entry-role {
      font-family: 'Rajdhani', sans-serif;
      font-size: 12.5px; font-weight: 700; letter-spacing: .14em;
      text-transform: uppercase; color: var(--silver); margin-bottom: 2px;
    }
    .entry-loc { font-size: 12.5px; color: var(--silver); font-style: italic; margin-bottom: 16px; opacity: .7; }
    .entry-focus {
      font-size: .9rem; color: var(--silver); font-style: italic;
      padding: 9px 14px; background: rgba(255,255,255,.025);
      border-left: 2px solid var(--border2); border-radius: 0 3px 3px 0;
    }
    .bullets { list-style: none; display: flex; flex-direction: column; gap: 11px; }
    .bullets li { padding-left: 22px; position: relative; font-size: .97rem; color: var(--cream); }
    .bullets li::before { content: '\25B8'; position: absolute; left: 0; top: 5px; color: var(--gold); font-size: 11px; }
    .bullets li strong { color: var(--white); font-weight: 600; }

    /* HOBBIES */
    .hobbies-row { display: flex; gap: 14px; flex-wrap: wrap; }
    .hobby-chip {
      display: flex; align-items: center; gap: 10px;
      background: var(--card); border: 1px solid var(--border2);
      border-radius: 4px; padding: 12px 22px;
      font-family: 'Rajdhani', sans-serif; font-size: 14px; font-weight: 600;
      letter-spacing: .1em; text-transform: uppercase; color: var(--cream);
      transition: border-color .2s, box-shadow .2s;
    }
    .hobby-chip:hover { border-color: var(--gold-dk); box-shadow: 0 0 16px rgba(201,168,76,.1); }
    .hobby-icon { font-size: 20px; }

    /* BENCHMARK */
    .bench-card {
      position: relative; overflow: hidden;
      background: linear-gradient(130deg, var(--card), #0C101D);
      border: 1px solid var(--border); border-radius: var(--r);
      padding: 36px 40px; display: flex; align-items: center; gap: 36px; flex-wrap: wrap;
    }
    .bench-card::before {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(ellipse at 0% 50%, rgba(201,168,76,.1) 0%, transparent 55%);
      pointer-events: none;
    }
     .bench-score {
      font-family: 'Playfair Display', serif;
      font-size: 4.2rem; font-weight: 900; line-height: 1;
      color: var(--gold); flex-shrink: 0;
      text-shadow: 0 0 50px rgba(201,168,76,.4);
    }
    .bench-score sup { font-size: 1.3rem; color: var(--gold-dk); font-weight: 400; }
    .bench-vr {
      width: 1px; height: 68px; flex-shrink: 0;
      background: linear-gradient(180deg, transparent, var(--gold-dk) 30%, var(--gold-dk) 70%, transparent);
    }
    .bench-body strong {
      font-family: 'Rajdhani', sans-serif; font-size: 1.05rem; font-weight: 700;
      letter-spacing: .08em; color: var(--white); display: block; margin-bottom: 8px;
    }
    .bench-body p { font-size: .93rem; color: var(--silver); max-width: 460px; line-height: 1.7; }

    /* FOOTER */
    footer {
      position: relative; z-index: 1;
      border-top: 1px solid var(--border); padding: 30px 6vw;
    }
    .footer-inner {
      max-width: 960px; margin: 0 auto;
      display: flex; align-items: center; justify-content: center; gap: 18px;
      font-family: 'Rajdhani', sans-serif;
      font-size: 10.5px; letter-spacing: .22em; text-transform: uppercase; color: var(--border2);
    }
    .footer-gem { color: var(--gold-dk); font-size: 8px; }

    @media (max-width: 700px) {
      .hero-inner { flex-direction: column; align-items: center; text-align: center; }
      .hero-text { order: 2; }
      .photo-frame { order: 1; }
      .cv-badge, .contacts { justify-content: center; }
      .nav-links { display: none; }
      .entry-head { flex-direction: column; }
      .bench-card { flex-direction: column; }
      .bench-vr { display: none; }
    }
    @media (prefers-reduced-motion: reduce) {
      .section { opacity: 1; transform: none; }
      .entry:hover { transform: none; }
    }
  </style>
</head>
